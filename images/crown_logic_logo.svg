<svg width="680" height="420" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Crown Logic final logo</title>
  <desc>Final Crown Logic logo — midnight dark background with electric blue bracket crown and class declaration wordmark</desc>

  <rect x="0" y="0" width="680" height="420" rx="16" style="fill:#080F1A;"/>

  <!-- subtle grid texture -->
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="0" y1="105" x2="680" y2="105"/>
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="0" y1="210" x2="680" y2="210"/>
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="0" y1="315" x2="680" y2="315"/>
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="170" y1="0" x2="170" y2="420"/>
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="340" y1="0" x2="340" y2="420"/>
  <line style="stroke:#0D1926;stroke-width:0.5;" x1="510" y1="0" x2="510" y2="420"/>

  <!-- crown mark -->
  <g transform="translate(272, 52)">
    <polyline style="fill:none;stroke:#0F2744;stroke-width:2.5;stroke-linecap:square;" points="14,0 0,0 0,116 14,116"/>
    <polyline style="fill:none;stroke:#0F2744;stroke-width:2.5;stroke-linecap:square;" points="122,0 136,0 136,116 122,116"/>
    <polyline style="fill:none;stroke:#3B9EFF;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;"
      points="22,100 22,44 44,70 68,10 92,70 114,44 114,100"/>
    <line style="stroke:#3B9EFF;stroke-width:3;" x1="22" y1="100" x2="114" y2="100"/>
    <line style="stroke:#1A4A8A;stroke-width:1;" x1="22" y1="104" x2="114" y2="104"/>
    <circle style="fill:#080F1A;stroke:#3B9EFF;stroke-width:2;" cx="22"  cy="44" r="5.5"/>
    <circle style="fill:#080F1A;stroke:#3B9EFF;stroke-width:2;" cx="114" cy="44" r="5.5"/>
    <circle style="fill:#3B9EFF;"                                cx="68"  cy="10" r="7.5"/>
    <circle style="fill:#080F1A;stroke:#3B9EFF;stroke-width:1.5;" cx="44"  cy="70" r="4"/>
    <circle style="fill:#080F1A;stroke:#3B9EFF;stroke-width:1.5;" cx="92"  cy="70" r="4"/>
    <line style="stroke:#1A4A8A;stroke-width:1;" x1="68" y1="2" x2="68" y2="0"/>
  </g>

  <!-- wordmark -->
  <text x="340" y="238" text-anchor="middle"
    style="font-family:'Inter',sans-serif;font-weight:500;font-size:40px;fill:#E8F4FF;letter-spacing:0.03em;">Crown Logic</text>

  <!-- divider -->
  <line style="stroke:#0F2744;stroke-width:0.75;" x1="120" y1="252" x2="560" y2="252"/>

  <!-- class declaration -->
  <text x="340" y="274" text-anchor="middle"
    style="font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;fill:#163E6E;">extends <tspan style="fill:#3B9EFF;">SoftwareDev</tspan></text>
  <text x="340" y="294" text-anchor="middle"
    style="font-family:'JetBrains Mono','Fira Code',monospace;font-size:12px;fill:#163E6E;">implements <tspan style="fill:#5BB8FF;">Excellence</tspan></text>

  <!-- comment footer -->
  <text x="340" y="330" text-anchor="middle"
    style="font-family:'JetBrains Mono','Fira Code',monospace;font-size:9px;fill:#0F2744;">// est. 2026</text>

</svg>
